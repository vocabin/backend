spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/vocabin}
    username: ${SPRING_DATASOURCE_USERNAME:vocabin}
    password: ${SPRING_DATASOURCE_PASSWORD:vocabin123}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:vocabin-dev-secret-key-must-be-at-least-32-bytes!!}
  access-token-expiry-ms: 1800000   # 30분
  refresh-token-expiry-days: 30

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

cookie:
  domain: ${COOKIE_DOMAIN:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} %clr(%-5level){faint} %clr(%-40.40logger{39}){cyan} : %msg%n"
  level:
    root: INFO
    com.vocabin: INFO
